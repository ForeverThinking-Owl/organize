name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  actor-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Dist Runtime Smoke
        run: npm run start:dist

      - name: Actor Kernel Demo
        run: npm run demo

      - name: Hybrid Memory Demo
        run: npm run demo:memory

      - name: Memory Persistence Demo
        run: npm run demo:memory:persistence

      - name: Memory Store Demo
        run: npm run demo:memory:store

      - name: Skill Runtime Semantics Demo
        run: npm run demo:skill

      - name: Runtime Store Binding Demo
        run: npm run demo:runtime:store

      - name: Trace Persistence Demo
        run: npm run demo:trace:persistence

      - name: Human Input Runtime Demo
        run: npm run demo:human:input

      - name: Wait Approval Runtime Demo
        run: npm run demo:wait:approval

      - name: General Waiting Resume Demo
        run: npm run demo:waiting:resume

      - name: Pending Run Persistence Demo
        run: npm run demo:pending:run

      - name: Runtime Recovery Bundle Demo
        run: npm run demo:recovery:bundle

      - name: Cross Process Recovery Demo
        run: npm run demo:recovery:cross-process

      - name: External Event Runtime Demo
        run: npm run demo:external:event

      - name: External Event Validation Demo
        run: npm run demo:external:event:validation

      - name: Tool Approval Fail-Closed Demo
        run: npm run demo:tool:approval:fail-closed

      - name: Continuation Validation Demo
        run: npm run demo:continuation:validation

      - name: Organization Runtime Demo
        run: npm run demo:organization

      - name: Organization Recovery Demo
        run: npm run demo:organization:recovery

      - name: Organization Pending Recovery Demo
        run: npm run demo:organization:pending:recovery

      - name: Organization Lifecycle Hardening Demo
        run: npm run demo:organization:lifecycle
