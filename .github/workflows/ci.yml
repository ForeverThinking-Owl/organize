name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  actor-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Actor Kernel Demo
        run: npm run demo

      - name: Hybrid Memory Demo
        run: npm run demo:memory

      - name: Memory Persistence Demo
        run: npm run demo:memory:persistence

      - name: Memory Store Demo
        run: npm run demo:memory:store

      - name: Skill Runtime Semantics Demo
        run: npm run demo:skill
